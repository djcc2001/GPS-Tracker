<VirtualHost *:80>
    ServerName 18.190.159.143
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    <Directory /var/www/html/mapa>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/Juegos>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /mapa !
    ProxyPass /Juegos !
    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    ErrorLog ${APACHE_LOG_DIR}/gps_api_error.log
    CustomLog ${APACHE_LOG_DIR}/gps_api_access.log combined
</VirtualHost>
